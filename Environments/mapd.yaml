agents:
- name: agent0
  start: [0, 2]

map:
  dimensions: [7, 6]
  
  obstacles:
  # Muro verticale centrale (x=3)
  - [3, 3]
  - [3, 4]
  # [3, 5] è il corridoio libero per la Well-Formedness (Detour)
  # [3, 2] è il varco per il Task 0
  # [3, 1] è il varco per il Task 1
  # [3, 0] è una tasca di parcheggio aggiuntiva
  
  movable_obstacles:
  - [3, 2] # Parte bloccando il varco in alto
  
  non_task_endpoints:
  - [0, 5]
  - [6, 5]
  
  start_locations:
  - [1, 2] # Start task 0
  - [5, 1] # Start task 1
  
  goal_locations:
  - [5, 2] # Goal task 0
  - [1, 1] # Goal task 1

# === TASK DETERMINISTICI FORZATI ===
# Verranno eseguiti solo usando il flag -not_rand
tasks:
  - task_name: task0
    start: [1, 2]
    goal: [5, 2]
    start_time: 0
  - task_name: task1
    start: [5, 1]
    goal: [1, 1]
    start_time: 15

delays: {}

n_tasks: 2                
task_freq: 0.5            
n_delays_per_agent: 0